# Configuraci�n de la Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/eventos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# Se cambia MySQL8Dialect (depreciado) por el gen�rico moderno
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuraci�n de Swagger (Gu�a 9)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Seguridad y Logs
logging.level.org.springframework.security=INFO
# Evita que las consultas a la DB mantengan la sesi�n abierta innecesariamente
spring.jpa.open-in-view=false